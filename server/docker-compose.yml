version: "3.8"

services:
  ft-update-server:
    build:
      context: ..
      dockerfile: server/Dockerfile
    container_name: ft-update-server
    restart: unless-stopped
    ports:
      - "8765:8765"
    environment:
      - FT_PORT=8765
      - FT_VERSION=1.0.0
      # - FT_TOKEN=your-custom-token
      # - FT_CERT=/app/certs/cert.pem
      # - FT_KEY=/app/certs/key.pem
    volumes:
      - ./uploads:/app/uploads
      - ./certs:/app/certs
