name: Build and release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check source
        run: npm run check

      - name: Run tests
        run: npm test

      - name: Build Windows package
        run: npm run pack:win

      - name: Create update archive
        shell: powershell
        run: Compress-Archive -Path dist/FTSerialTool-win32-x64/* -DestinationPath FTSerialTool-win32-x64.zip -Force

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            FTSerialTool-win32-x64.zip
